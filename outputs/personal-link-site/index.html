<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的收藏库</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="收藏分类">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">L</span>
          <div>
            <h1>我的收藏库</h1>
            <p>链接整理与公开分享</p>
          </div>
        </div>

        <nav class="category-list" id="categoryList" aria-label="分类筛选"></nav>

        <section class="side-panel">
          <div class="panel-title">整理状态</div>
          <button class="side-stat active" data-status="all">
            <span>全部收藏</span>
            <strong id="countAll">0</strong>
          </button>
          <button class="side-stat" data-status="unread">
            <span>未读</span>
            <strong id="countUnread">0</strong>
          </button>
          <button class="side-stat" data-status="reading">
            <span>阅读中</span>
            <strong id="countReading">0</strong>
          </button>
          <button class="side-stat" data-status="done">
            <span>已读</span>
            <strong id="countDone">0</strong>
          </button>
          <button class="side-stat" data-status="archived">
            <span>已归档</span>
            <strong id="countArchived">0</strong>
          </button>
          <button class="side-stat" data-status="failed">
            <span>抓取失败</span>
            <strong id="countFailed">0</strong>
          </button>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10.8 18.1a7.3 7.3 0 1 1 5.2-2.1l4 4-1.4 1.4-4-4a7.2 7.2 0 0 1-3.8 1.1Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Z" />
            </svg>
            <input id="searchInput" type="search" placeholder="搜索标题、来源、标签、备注" />
          </div>
          <div class="top-actions">
            <button class="ghost-button" id="exportBtn" type="button">导出</button>
            <button class="primary-button" id="openImportBtn" type="button">导入链接</button>
          </div>
        </header>

        <section class="summary-band" aria-label="收藏概览">
          <div>
            <p class="section-label">今日工作台</p>
            <h2>把分散收藏变成可复用的个人资料库</h2>
          </div>
          <div class="summary-metrics">
            <span><strong id="metricTotal">0</strong> 条收藏</span>
            <span><strong id="metricTags">0</strong> 个标签</span>
            <span><strong id="metricPublic">0</strong> 条快照</span>
          </div>
        </section>

        <section class="filter-row" aria-label="筛选条件">
          <button class="filter-tab active" data-filter="all" type="button">全部</button>
          <button class="filter-tab" data-filter="工程造价" type="button">工程造价</button>
          <button class="filter-tab" data-filter="招投标" type="button">招投标</button>
            <button class="filter-tab" data-filter="合同风险" type="button">合同风险</button>
            <button class="filter-tab" data-filter="学习资料" type="button">学习资料</button>
            <button class="filter-tab" data-filter="待复核" type="button">待复核</button>
            <button class="filter-tab" data-filter="重要" type="button">重要</button>
          </section>

        <section class="content-layout">
          <div class="collection-panel">
            <div class="panel-heading">
              <h3>收藏清单</h3>
              <span id="resultCount">0 条结果</span>
            </div>
            <div class="link-list" id="linkList"></div>
          </div>

          <aside class="detail-panel" aria-label="收藏详情">
            <div id="detailEmpty" class="empty-detail">
              <strong>选择一条收藏</strong>
              <span>查看自动分类、标签、公开状态和整理建议。</span>
            </div>
            <div id="detailView" class="detail-view hidden"></div>
          </aside>
        </section>
      </main>
    </div>

    <dialog id="importDialog" class="import-dialog">
      <form method="dialog" class="import-card" id="importForm">
        <div class="dialog-head">
          <h2>导入链接</h2>
          <button class="icon-button" value="cancel" aria-label="关闭" type="button" data-close-import>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z" />
            </svg>
          </button>
        </div>
        <label>
          链接地址
          <input id="urlInput" type="url" placeholder="https://example.com/article" required />
        </label>
        <label>
          标题或说明
          <input id="titleInput" type="text" placeholder="可选：不填时会尝试从网页标题识别" />
        </label>
        <label>
          备注
          <textarea id="noteInput" rows="4" placeholder="可粘贴摘要、使用场景、风险点或待办事项"></textarea>
        </label>
        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="button" data-close-import>取消</button>
          <button class="primary-button" value="default" type="submit">保存并归档</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
